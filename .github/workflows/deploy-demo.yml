name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: example/package-lock.json

      - name: Install demo deps
        working-directory: example
        run: npm ci

      - name: Build demo
        working-directory: example
        env:
          # Served from https://<user>.github.io/vite-lazy-encrypt/
          DEMO_BASE: /vite-lazy-encrypt/
          # The demo password. Public on purpose; set a repo secret named
          # SECRET_PW to override, otherwise this default is used.
          SECRET_PW: ${{ secrets.SECRET_PW || 'opensesame' }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: example/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
